  description: |
    Here I upload a model from a simple TR-SFX experiment in which the residue of interest is partially decarboxylated and adopts partially a different conformation as compared to the ground state. In this example, we deposited the structure refined in extrapolated structure factor amplitudes (ESFAs). However, if we would have to make an ensemble that represents the collected data (i.e. ground state + intermediate), how would I make clear that conformer A refers to the ground state and conformer X, Y to the intermediate state? In the next section I give more context.
  issues: |
    With the low occupancy of the intermediate state(s), we resort to structure factor extrapolation. However, right now many groups, including us, deposit the structure refined in extrapolated structure factor amplitudes (ESFAs), and the extrapolated structure factor amplitudes as the associated data. Others deposited the ESFA-refined structure but the unextrapolated data (i.e. Fobs or Iobs). Others make an ensemble model of the ground and intermediate state and deposit unextrapolated data. More and more, the community seem to agree that the latter should be used, i.e. use ESFAs to get the structure of the intermediate state but then make an ensemble model that matches best the collected data. However, there is no standard yet about to proceed with this, indeed you can have multiple conformations in both states. Furthermore, with the maps calculated from the TR-experiment only, the intermediate state is too weakly populated to be present. Hence, users would need the ESFAs too or need the exact procedure to reproduce them (and thus also access to the ground state data that has been used).
  residues: "A:215"
notes: "I'll be happy yo give more information and discuss further"
